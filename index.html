
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacking Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.4;
      overflow: hidden;
      height: 100vh;
      padding: 20px;
    }

    .terminal {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      background: linear-gradient(90deg, #003300, #001a00);
      padding: 10px 15px;
      border-bottom: 2px solid #0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-title {
      font-weight: bold;
      text-shadow: 0 0 5px #0f0;
    }

    .terminal-status {
      font-size: 12px;
      color: #0a0;
    }

    .terminal-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: rgba(0, 20, 0, 0.95);
      position: relative;
    }

    .terminal-content::-webkit-scrollbar {
      width: 8px;
    }

    .terminal-content::-webkit-scrollbar-track {
      background: #001a00;
    }

    .terminal-content::-webkit-scrollbar-thumb {
      background: #0f0;
      border-radius: 4px;
    }

    .output-line {
      margin-bottom: 5px;
      word-wrap: break-word;
      animation: fadeIn 0.1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .prompt {
      color: #0f0;
      font-weight: bold;
      margin-right: 8px;
    }

    .command {
      color: #fff;
    }

    .success {
      color: #0f0;
    }

    .warning {
      color: #ff0;
    }

    .error {
      color: #f00;
    }

    .info {
      color: #0ff;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .input-line {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    #command-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      outline: none;
      caret-color: #0f0;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(0, 255, 0, 0.3);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    .glow {
      text-shadow: 0 0 5px #0f0, 0 0 10px #0f0;
    }

    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.05;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas class="matrix-bg" id="matrix"></canvas>
  
  <div class="terminal">
    <div class="terminal-header">
      <div class="terminal-title glow">HACKING TERMINAL v2.0</div>
      <div class="terminal-status">CONNECTED: SECURE 🟢</div>
    </div>
    
    <div class="terminal-content" id="terminal-content">
      <div class="scan-line"></div>
      <div class="output-line glow">
       Initializing hacking terminal...
      </div>
      <div class="output-line success">
        [SUCCESS] System loaded successfully
      </div>
      <div class="output-line info">
        [INFO] Available commands: help, clear, date, whoami, echo, hack, status
      </div>
      <div class="output-line warning">
        [WARNING] Unauthorized access detected - Initiating countermeasures
      </div>
      <br>
      
      <div class="input-line">
        <span class="prompt">root@hacker:~$</span>
        <input type="text" id="command-input" autofocus autocomplete="off">
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('command-input');
    const content = document.getElementById('terminal-content');
    const scanLine = document.querySelector('.scan-line');

    // Matrix effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = '0123456789ABCDEF';
    const columns = Math.floor(canvas.width / 20);
    const drops = Array(columns).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#0f0';
      ctx.font = '15px monospace';
      
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * 20, drops[i] * 20);
        
        if (drops[i] * 20 > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 50);

    // Terminal commands
    const commands = {
      help: () => `
        <span class="info">Available Commands:</span>
        <br>  <span class="command">help</span> - Show this help message
        <br>  <span class="command">clear</span> - Clear terminal screen
        <br>  <span class="command">date</span> - Show current date/time
        <br>  <span class="command">whoami</span> - Show current user
        <br>  <span class="command">echo [text]</span> - Echo text back
        <br>  <span class="command">hack</span> - Start fake hacking simulation
        <br>  <span class="command">status</span> - Show system status
      `,
      
      clear: () => {
        // Clear all output lines except input
        const outputLines = content.querySelectorAll('.output-line');
        outputLines.forEach(line => line.remove());
        return null;
      },
      
      date: () => `<span class="info">${new Date().toString()}</span>`,
      
      whoami: () => `<span class="success">root@hacker-system</span>`,
      
      echo: (args) => args.length > 0 ? `<span class="command">${args.join(' ')}</span>` : 'echo: missing argument',
      
      hack: () => {
        simulateHack();
        return null;
      },
      
      status: () => `
        <span class="success">[SYSTEM STATUS]</span>
        <br>  CPU: 87% 🔥
        <br>  Memory: 4.2GB / 8GB
        <br>  Network: CONNECTED 🟢
        <br>  Firewall: DISABLED ⚠️
        <br>  Proxy: ACTIVE 🟢
        <br>  Encryption: AES-256 🔒
      `
    };

    function addOutput(text, className = '') {
      const line = document.createElement('div');
      line.className = 'output-line ' + className;
      line.innerHTML = text;
      content.insertBefore(line, content.querySelector('.input-line'));
      content.scrollTop = content.scrollHeight;
    }

    function processCommand(cmd) {
      const parts = cmd.trim().split(' ');
      const command = parts[0].toLowerCase();
      const args = parts.slice(1);

      // Add the command to history
      addOutput(`<span class="prompt">root@hacker:~$</span> <span class="command">${cmd}</span>`);

      if (commands[command]) {
        const result = commands[command](args);
        if (result) {
          addOutput(result);
        }
      } else if (cmd.trim()) {
        addOutput(`<span class="error">Error:</span> Command not found: ${command}. Type 'help' for available commands.`, 'error');
      }
    }

    function simulateHack() {
      const messages = [
        { text: 'Initiating brute force attack...', class: 'info' },
        { text: '[+] Target IP: 192.168.1.105', class: 'success' },
        { text: '[+] Port scanning... 22, 80, 443 OPEN', class: 'success' },
        { text: '[*] Trying password list...', class: 'info' },
        { text: '[+] Password found: admin123', class: 'success' },
        { text: '[+] Access granted!', class: 'success' },
        { text: '[*] Downloading sensitive data...', class: 'info' },
        { text: '[+] 1,234 files downloaded', class: 'success' },
        { text: '[*] Encrypting data with AES-256...', class: 'info' },
        { text: '[+] Encryption complete', class: 'success' },
        { text: '[*] Covering tracks...', class: 'info' },
        { text: '[+] Logs cleared', class: 'success' },
        { text: '[SUCCESS] Operation completed successfully', class: 'success' }
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i < messages.length) {
          addOutput(messages[i].text, messages[i].class);
          i++;
        } else {
          clearInterval(interval);
        }
      }, 800);
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const cmd = input.value;
        input.value = '';
        processCommand(cmd);
      }
    });

    // Keep focus on input
    document.addEventListener('click', () => input.focus());

    // Resize matrix canvas on window resize
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Auto-scroll to bottom
    content.scrollTop = content.scrollHeight;
  </script>
</body>
</html>
